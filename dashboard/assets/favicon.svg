<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0099cc"/>
    </linearGradient>
  </defs>
  <!-- Latar belakang bulat -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Garis dekoratif -->
  <line x1="8" y1="20" x2="56" y2="20" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="8" y1="30" x2="56" y2="30" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Huruf YWM -->
  <text x="32" y="29" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="18" fill="url(#accent)">YWM</text>
  <!-- Subtitle -->
  <text x="32" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="rgba(255,255,255,0.7)">DASHBOARD</text>
  <!-- Dekorasi titik -->
  <circle cx="12" cy="52" r="2" fill="#00d4ff" opacity="0.5"/>
  <circle cx="20" cy="52" r="2" fill="#00d4ff" opacity="0.3"/>
  <circle cx="28" cy="52" r="2" fill="#00d4ff" opacity="0.2"/>
</svg>
