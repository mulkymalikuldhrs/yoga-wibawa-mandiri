<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0;url=dashboard/">
    <title>PT Yoga Wibawa Mandiri — Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="dashboard/assets/favicon.svg">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .loading {
            text-align: center;
            animation: fadeIn 0.5s ease;
        }
        .loading h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #00d4ff;
        }
        .loading p {
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="loading">
        <div class="spinner"></div>
        <h1>YWM Dashboard</h1>
        <p>Memuat dashboard PT Yoga Wibawa Mandiri...</p>
        <p style="font-size:0.75rem; margin-top:1rem;">Jika tidak otomatis redirect, <a href="dashboard/" style="color:#00d4ff;">klik di sini</a></p>
    </div>
    <script>
        // Fallback redirect jika meta refresh tidak bekerja
        setTimeout(function() {
            window.location.href = 'dashboard/';
        }, 1000);
    </script>
</body>
</html>
